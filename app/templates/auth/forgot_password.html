{% extends "base.html" %}

{% block title %}Forgot Password - DemandAI{% endblock %}

{% block header_title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="auth-brand">
                <i class="bi bi-key-fill me-2 text-primary"></i>DemandAI
            </a>
            <h5 class="text-white fw-bold mb-1">Recover Password</h5>
            <p class="text-muted fs-7">Provide your email address to receive a secure password reset link</p>
        </div>

        <form action="{{ url_for('auth.forgot_password') }}" method="POST" id="forgot-password-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-4">
                <label for="email" class="form-label-custom">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-primary-custom border-0"><i class="bi bi-envelope text-white"></i></span>
                    <input type="email" class="form-control form-control-custom" id="email" name="email" required placeholder="name@company.com">
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 py-2 fs-6 mb-3">
                Send Reset Link <i class="bi bi-send ms-1"></i>
            </button>

            <div class="text-center mt-3">
                <a href="{{ url_for('auth.login') }}" class="text-secondary-custom fs-7" style="text-decoration: none;"><i class="bi bi-arrow-left"></i> Back to sign-in</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
